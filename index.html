
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmed Love - Corazón Real</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px; /* Activa la vista 3D */
        }

        .container {
            position: relative;
            transform-style: preserve-3d;
            /* Animación para que todo el corazón gire lentamente */
            animation: spin 15s infinite linear;
        }

        .love_word {
            color: #ea80b0;
            font-size: 1.2rem;
            font-family: Arial, sans-serif;
            position: absolute;
            text-shadow: 0 0 10px #ffb3d9; /* Efecto de brillo (Glow) */
            white-space: nowrap;
            opacity: 0;
            /* Animación de latido y aparición */
            animation: pulse 2s infinite alternate, fadeIn 1s forwards;
        }

        /* Keyframes para las animaciones */
        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(-50%, -50%); text-shadow: 0 0 10px #ffb3d9; }
            100% { transform: scale(1.1) translate(-50%, -50%); text-shadow: 0 0 20px #ff007f; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container" id="heart-container"></div>

    <script>
        const container = document.getElementById('heart-container');
        const totalWords = 80; // Cantidad de "I love you" que forman el corazón

        for (let i = 0; i < totalWords; i++) {
            // t va de 0 a 2*PI (un círculo completo para la fórmula matemática)
            const t = (i / totalWords) * Math.PI * 2;
            
            // Factor de escala para hacer el corazón más grande
            const scale = 15; 

            // Ecuación matemática del corazón
            const x = 16 * Math.pow(Math.sin(t), 3) * scale;
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * scale;

            // Crear el elemento div de texto
            const word = document.createElement('div');
            word.className = 'love_word';
            word.textContent = 'I love you';

            // Posicionar el elemento
            word.style.left = `${x}px`;
            word.style.top = `${y}px`;

            // Darle un efecto de profundidad 3D aleatorio a cada palabra
            const zDepth = (Math.random() * 60) - 30; 
            word.style.transform = `translate(-50%, -50%) translateZ(${zDepth}px)`;

            // Hacer que aparezcan uno por uno para el efecto visual
            word.style.animationDelay = `${i * 0.05}s, ${i * 0.05}s`;

            container.appendChild(word);
        }
    </script>
</body>
</html>
